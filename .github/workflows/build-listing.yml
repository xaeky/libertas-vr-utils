name: Build Repo Listing

env:
  listPublishDirectory: Website
  
on:
  workflow_run:
    workflows: [Build Packages]
    types: [completed]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  
# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build the VPM Listing and deploy to GitHub Pages
  build-listing:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: build-listing
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      
      # Checkout Local Repository
      - name: Checkout Local Repository
        uses: actions/checkout@v4

      # Build package version listing with Scripts/buildListing.sh
      - name: Build Package Version Listing with Script
        run: bash Scripts/buildListing.sh

      # Prepare for GitHub Pages deployment
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      # Upload the VPM Listing Website to GitHub Pages artifacts
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.listPublishDirectory }}
      
      # Deploy the uploaded VPM Listing Website to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4